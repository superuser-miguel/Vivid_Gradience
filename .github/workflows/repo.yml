name: Repo

on:
  # Rebuild once a day
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  flatpak:
    name: Flatpak
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    strategy:
      # Don't fail the whole workflow if one architecture fails
      fail-fast: false
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.variant.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup GPG
        id: gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: com.github.superuser-miguel.VividGradience.flatpak
          manifest-path: build-aux/flatpak/com.github.superuser-miguel.VividGradience.json
          cache-key: flatpak-builder-${{ github.sha }}-${{ matrix.variant.arch }}
          arch: ${{ matrix.variant.arch }}
          gpg-sign: ${{ steps.gpg.outputs.fingerprint }}
          verbose: true

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          repository-name: gnome-nightly
          bundle: com.github.superuser-miguel.VividGradience.Devel.flatpak
          manifest-path: build-aux/flatpak/com.github.superuser-miguel.VividGradience.Devel.json
          cache-key: flatpak-builder-${{ github.sha }}-${{ matrix.variant.arch }}
          arch: ${{ matrix.variant.arch }}
          gpg-sign: ${{ steps.gpg.outputs.fingerprint }}
          verbose: true
